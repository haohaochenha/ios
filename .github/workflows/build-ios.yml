name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build app
      run: |
        xcodebuild -project ios-demo.xcodeproj \
          -scheme ios-demo \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath build/DerivedData \
          build CODE_SIGNING_ALLOWED=NO
      
    - name: Create IPA
      run: |
        mkdir -p Payload
        APP_PATH=$(find build/DerivedData -name 'ios-demo.app' -type d)
        cp -R "$APP_PATH" Payload/
        zip -r ios-demo.ipa Payload
      
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-demo-ipa
        path: ios-demo.ipa
        retention-days: 7